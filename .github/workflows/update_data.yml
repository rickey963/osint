name: OSINT Auto-Update (Fetch & Deploy)

on:
  schedule:
    # Native GitHub Actions cron is unreliable on its own (proven in the
    # medint project: multi-hour gaps even while "active") - kept only as a
    # rare fallback. The push-triggered self-chain below (see checkout
    # step's token) is what actually drives the ~1-3 minute cadence.
    - cron: '7-59/15 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: osint-auto-update
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Full history isn't needed - the commit step re-fetches origin/main
          # and rebases before pushing, so a shallow clone of the tip is enough
          # and skips downloading the (large, ever-growing) automated-commit history.
          fetch-depth: 1
          # A push made with the default GITHUB_TOKEN does not trigger this
          # workflow's own `push` trigger (GitHub's anti-loop guard). A PAT
          # isn't subject to that guard, so pushing with it makes each run's
          # commit kick off the next run immediately - a self-sustaining
          # chain that doesn't depend on the schedule firing at all.
          token: ${{ secrets.ACTIONS_PUSH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data fetcher
        run: python fetch_data.py

      - name: Commit and Push Data Updates
        run: |
          git config --local user.email "rickey@o2.pl"
          git config --local user.name "rickey963"
          git add data.json map_history.json
          if ! git diff --cached --quiet; then
            git commit -m "Automated OSINT Data Update: $(date -u +%FT%TZ)"
            for i in {1..5}; do
              echo "Attempt $i to push to origin main..."
              git fetch origin main
              git rebase origin/main -X theirs
              if git push origin main; then
                echo "Push successful!"
                break
              fi
              echo "Push failed, retrying in 10s..."
              sleep 10
            done
          else
            echo "No data changes detected, skipping commit."
          fi

      # Deploys via the Actions pipeline (artifact upload + actions/deploy-
      # pages) rather than GitHub's legacy Jekyll-based "Deploy from a
      # branch" builder. That legacy builder has an internal, undocumented
      # build-rate limit that this workflow's own push cadence (every
      # ~30-60s while the self-chaining push trigger is active) reliably
      # tripped, producing repeated "Page build failed" runs (confirmed via
      # the Pages API - same root cause already fixed in medint's
      # fetch_data.py/.github/workflows). Uploading a plain static artifact
      # has no build step to fail. Requires repo Settings -> Pages -> Source
      # = "GitHub Actions" (set once, not per-run).
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp index.html style.css app.js data.json map_history.json _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
