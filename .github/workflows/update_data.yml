name: Update OSINT Data

on:
  schedule:
    # GitHub Actions minimum interval is ~5 minutes.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data fetcher
        run: python fetch_data.py

      - name: Commit and push if changes detected
        run: |
          git config --local user.email "rickey@o2.pl"
          git config --local user.name "rickey963"
          git add data.json
          if git diff --quiet && git diff --staged --exit-code; then
            echo "No changes to commit"
          else
            git commit -m "chore: automated update of OSINT data"
            git push
          fi
